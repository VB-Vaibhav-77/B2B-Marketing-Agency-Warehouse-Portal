name: ApexAnalytics CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run every Monday at 00:00 UTC to simulate scheduled production updates
    - cron: '0 0 * * 1'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install black flake8

    - name: Code Quality Auditing (Linting)
      run: |
        # Check syntax errors and formatting
        # stop the build if there are Python syntax errors or undefined names
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run Unit Tests with pytest
      run: |
        python -m pytest tests/ -v

    - name: Execute Full B2C and B2B ETL Pipelines & Validate Data
      run: |
        python main.py
        python main_agency.py

    - name: Upload Clean B2B and B2C Tables & Views to Google BigQuery Cloud
      env:
        GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
        GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
      run: |
        python run_bigquery_agency.py
        python run_bigquery_analysis.py

    - name: Archive compiled B2C SQLite database artifact
      uses: actions/upload-artifact@v4
      with:
        name: compiled-b2c-sqlite-db
        path: data/apex_analytics.db
        retention-days: 7

    - name: Archive compiled B2B SQLite database artifact
      uses: actions/upload-artifact@v4
      with:
        name: compiled-b2b-sqlite-db
        path: data/agency_analytics.db
        retention-days: 7

    - name: Archive B2B data validation report
      uses: actions/upload-artifact@v4
      with:
        name: agency-validation-report
        path: data/agency_validation_report.csv
        retention-days: 7
